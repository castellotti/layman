services:
  layman:
    build: .
    image: layman
    container_name: layman
    ports:
      - "8090:8090"
    volumes:
      # Mount the host project's .claude dir so the installer can write hook config
      - ${LAYMAN_PROJECT_DIR:-.}/.claude:/workspace/.claude
      - ${LAYMAN_PROJECT_DIR:-.}/.opencode:/workspace/.opencode
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LAYMAN_API_KEY=${LAYMAN_API_KEY:-}
      - LAYMAN_URL=http://localhost:8090
    command: >
      node packages/server/dist/index.js start
      --host 0.0.0.0
      --no-open
      --settings-path /workspace/.claude/settings.local.json
      --hook-url http://localhost:8090
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8090/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
